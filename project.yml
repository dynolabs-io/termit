name: Termit
options:
  bundleIdPrefix: io.dynolabs
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  developmentLanguage: en
  xcodeVersion: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "$(TERMIT_TEAM_ID)"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

packages:
  SwiftNIOSSH:
    url: https://github.com/apple/swift-nio-ssh.git
    from: "0.10.0"
  SwiftNIO:
    url: https://github.com/apple/swift-nio.git
    from: "2.65.0"
  SwiftCrypto:
    url: https://github.com/apple/swift-crypto.git
    from: "3.4.0"
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.7.0"

targets:
  Termit:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Termit
        excludes:
          - Widgets/**
          - WatchApp/**
          - Intents/**
      - path: Resources
        buildPhase: resources
    info:
      path: Sources/Termit/App/Info.plist
      properties:
        CFBundleDisplayName: Termit
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
        UIBackgroundModes:
          - audio
          - processing
          - remote-notification
        NSFaceIDUsageDescription: Termit uses Face ID to unlock SSH keys stored in the Secure Enclave.
        NSCameraUsageDescription: Termit uses the camera to scan QR codes containing SSH connection parameters.
        NSLocalNetworkUsageDescription: Termit connects to SSH/Mosh servers on your local network.
        NSBonjourServices:
          - _ssh._tcp
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.developer-tools
    entitlements:
      path: Sources/Termit/App/Termit.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)io.dynolabs.termit
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.io.dynolabs.termit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.io.dynolabs.termit
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.usernotifications.communication: true
    dependencies:
      - package: SwiftNIOSSH
      - package: SwiftNIO
        product: NIOCore
      - package: SwiftNIO
        product: NIOPosix
      - package: SwiftCrypto
        product: Crypto
      - package: Citadel
      - target: TermitWidgets
      - target: TermitWatchApp
      - target: TermitIntents
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.dynolabs.termit

  TermitWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Termit/Widgets
    info:
      path: Sources/Termit/Widgets/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.dynolabs.termit.widgets

  TermitWatchApp:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Sources/Termit/WatchApp
    info:
      path: Sources/Termit/WatchApp/Info.plist
      properties:
        WKApplication: true
        WKWatchOnly: false
        WKCompanionAppBundleIdentifier: io.dynolabs.termit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.dynolabs.termit.watchkitapp

  TermitIntents:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Termit/Intents
    info:
      path: Sources/Termit/Intents/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.intents-service
          NSExtensionAttributes:
            IntentsSupported:
              - ConnectToHostIntent
              - RunSnippetIntent
              - DisconnectAllIntent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.dynolabs.termit.intents

  TermitTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/Unit
    dependencies:
      - target: Termit

  TermitUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/Integration
    dependencies:
      - target: Termit

schemes:
  Termit:
    build:
      targets:
        Termit: all
        TermitWidgets: all
        TermitWatchApp: all
        TermitIntents: all
    test:
      targets:
        - TermitTests
        - TermitUITests
    run:
      config: Debug
    archive:
      config: Release
